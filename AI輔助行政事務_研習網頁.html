<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI輔助行政事務</title>
<style>
  :root{
    --bg:#f4f6f8; --panel:#ffffff; --ink:#1c2733; --sub:#5a6b7b;
    --line:#d9e0e7; --accent:#17a398; --accent-soft:#e5f4f2;
    --shadow:0 8px 30px rgba(20,40,60,.10); --thumb:#cfd8e0;
  }
  html[data-theme="dark"]{
    --bg:#0d1117; --panel:#161c24; --ink:#e8eef4; --sub:#9fb0c0;
    --line:#2a333f; --accent:#2fd0c0; --accent-soft:#123433;
    --shadow:0 8px 30px rgba(0,0,0,.5); --thumb:#33404d;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:"PingFang TC","Microsoft JhengHei","Noto Sans TC",system-ui,sans-serif;
    background:var(--bg); color:var(--ink); height:100vh; overflow:hidden;
    display:flex; flex-direction:column; transition:background .3s,color .3s;
  }
  /* ---- Top bar ---- */
  header{
    display:flex; align-items:center; gap:18px; padding:12px 24px;
    background:var(--panel); border-bottom:1px solid var(--line); box-shadow:var(--shadow);
    z-index:5; flex-wrap:wrap;
  }
  .brand{display:flex;align-items:baseline;gap:12px;flex:1;min-width:200px}
  .brand h1{font-size:1.5rem;letter-spacing:1px}
  .brand .dot{width:10px;height:10px;border-radius:50%;background:var(--accent);display:inline-block}
  .page-ind{font-size:.95rem;color:var(--sub);white-space:nowrap}
  .controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  button.ctrl,select,input[type=number]{
    font-family:inherit;font-size:.9rem;color:var(--ink);background:var(--bg);
    border:1px solid var(--line);border-radius:9px;padding:8px 12px;cursor:pointer;
    transition:.15s; display:flex;align-items:center;gap:6px;
  }
  button.ctrl:hover{border-color:var(--accent);color:var(--accent)}
  button.primary{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}
  button.primary:hover{filter:brightness(1.08);color:#fff}
  input[type=number]{width:64px;text-align:center}
  .sec-wrap{display:flex;align-items:center;gap:6px;font-size:.85rem;color:var(--sub)}
  /* ---- Main area ---- */
  main{flex:1;display:flex;gap:0;min-height:0}
  .stage{
    flex:0 0 66.66%; max-width:66.66%; background:var(--bg);
    display:flex;align-items:center;justify-content:center;padding:22px 26px;min-height:0;
  }
  .stage img{
    max-width:100%; max-height:100%; object-fit:contain;
    border-radius:12px; box-shadow:var(--shadow); background:#fff;
  }
  .notes{
    flex:1; background:var(--panel); border-left:1px solid var(--line);
    padding:32px 34px; overflow-y:auto; display:flex; flex-direction:column; gap:16px;
  }
  .notes .unit{font-size:.8rem;color:var(--accent);font-weight:700;letter-spacing:1px}
  .notes h2{font-size:1.5rem;line-height:1.4}
  .notes p{font-size:1.18rem;line-height:2.05;color:var(--ink);text-align:justify}
  html[data-theme="dark"] .notes p{color:var(--sub)}
  .notes::-webkit-scrollbar{width:8px}
  .notes::-webkit-scrollbar-thumb{background:var(--thumb);border-radius:8px}
  /* ---- Filmstrip ---- */
  .strip-wrap{background:var(--panel);border-top:1px solid var(--line);padding:10px 16px}
  .strip{display:flex;gap:8px;overflow-x:auto;padding:4px 2px;scroll-behavior:smooth}
  .strip::-webkit-scrollbar{height:9px}
  .strip::-webkit-scrollbar-thumb{background:var(--thumb);border-radius:8px}
  .thumb{
    position:relative;flex:0 0 auto;width:122px;height:69px;border-radius:7px;overflow:hidden;
    cursor:pointer;border:3px solid transparent;opacity:.62;transition:.15s;background:#000
  }
  .thumb img{width:100%;height:100%;object-fit:cover;display:block}
  .thumb:hover{opacity:1}
  .thumb.active{border-color:var(--accent);opacity:1}
  .thumb .n{
    position:absolute;left:4px;top:3px;font-size:.7rem;background:rgba(0,0,0,.6);
    color:#fff;padding:1px 6px;border-radius:6px
  }
  /* ---- Footer ---- */
  footer{
    text-align:center;padding:7px;font-size:.85rem;color:var(--sub);
    background:var(--panel);border-top:1px solid var(--line)
  }
  /* ---- Fullscreen player ---- */
  #player{
    position:fixed;inset:0;background:#000;z-index:50;display:none;
    align-items:center;justify-content:center;
  }
  #player.on{display:flex}
  #player img{max-width:100vw;max-height:100vh;object-fit:contain}
  .p-ui{
    position:fixed;bottom:22px;left:50%;transform:translateX(-50%);
    display:flex;align-items:center;gap:14px;background:rgba(20,25,32,.82);
    padding:10px 18px;border-radius:40px;color:#fff;font-size:.9rem;
    opacity:0;transition:opacity .3s;backdrop-filter:blur(6px)
  }
  #player:hover .p-ui{opacity:1}
  .p-ui button{background:none;border:none;color:#fff;font-size:1.3rem;cursor:pointer;line-height:1}
  .p-ui button:hover{color:var(--accent)}
  .p-ui .pnum{min-width:64px;text-align:center;font-variant-numeric:tabular-nums}
  .p-ui .psec{display:flex;align-items:center;gap:5px;font-size:.82rem;opacity:.85}
  .p-ui input[type=number]{width:56px;background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.3)}
  .arrow{
    position:fixed;top:50%;transform:translateY(-50%);font-size:2.4rem;color:rgba(255,255,255,.35);
    background:none;border:none;cursor:pointer;padding:20px;z-index:51;transition:.15s
  }
  .arrow:hover{color:#fff}
  #pPrev{left:6px} #pNext{right:6px}
  @media (max-width:820px){
    .stage{flex-basis:100%;max-width:100%;height:44vh}
    main{flex-direction:column}
    .notes{border-left:none;border-top:1px solid var(--line)}
    .brand h1{font-size:1.2rem}
  }
</style>
</head>
<body>
<header>
  <div class="brand"><span class="dot"></span><h1>AI輔助行政事務</h1>
    <span class="page-ind" id="ind">1 / 45</span></div>
  <div class="controls">
    <button class="ctrl" id="prev">◀ 上一頁</button>
    <button class="ctrl" id="next">下一頁 ▶</button>
    <button class="ctrl" id="autoBtn">▶ 自動播放</button>
    <span class="sec-wrap">秒數<input type="number" id="secInput" value="12" min="2" max="120">秒</span>
    <button class="ctrl" id="themeBtn">🌙 深色</button>
    <button class="primary" id="fsBtn">⛶ 全螢幕播放</button>
  </div>
</header>

<main>
  <div class="stage"><img id="slideImg" src="" alt="投影片"></div>
  <div class="notes" id="notes">
    <div class="unit" id="nUnit"></div>
    <h2 id="nTitle"></h2>
    <p id="nText"></p>
  </div>
</main>

<div class="strip-wrap"><div class="strip" id="strip"></div></div>
<footer>臺北市立麗山高中　林獻升老師</footer>

<!-- Fullscreen player -->
<div id="player">
  <button class="arrow" id="pPrev">‹</button>
  <img id="pImg" src="" alt="投影片">
  <button class="arrow" id="pNext">›</button>
  <div class="p-ui">
    <button id="pPlay">⏸</button>
    <span class="pnum" id="pNum">1 / 45</span>
    <span class="psec">秒數<input type="number" id="pSec" value="12" min="2" max="120">秒</span>
    <button id="pExit" title="離開">✕</button>
  </div>
</div>

<script>
const IMG = n => `origin_image/slide_${String(n).padStart(2,'0')}.png`;
const TOTAL = 45;

const DATA = [
{u:"封面",t:"AI輔助行政事務",x:"各位先進，歡迎來到今天的研習。這幾年在教育現場，關於人工智慧的討論從沒停過，有人滿懷期待，也有人隱隱焦慮。今天我們想換一個角度來談：與其把 AI 看成取代人力的冷技術，不如把它當成行政大腦的延伸——也就是從 AI 走向 IA，用科技替我們做「智能增強」。接下來要分享的，都是我們麗山團隊在學校庶務裡，一步一腳印試出來的真實經驗。"},
{u:"引言",t:"關於講者",x:"正式開始前，容我們先簡單自我介紹。我們是麗山高中的生物科教師團隊。一直以來，我們相信教育的本質是生命的啟發——課堂上，我們帶著學生探索繽紛美妙的生物，編織幸福圓滿的生命；走下講台、投入行政推動時，我們同樣希望借助智能工具，把瑣碎的表格與法規交給機器處理，好讓自己能空出更多時間，去關懷一個一個真實的人。"},
{u:"核心觀念",t:"從 AI 走向 IA（智能增強）",x:"「AI 會不會取代老師、取代行政人員？」這樣的擔憂我們聽了很多。可是換個角度想，如果把 AI 理解為 IA，也就是智能增強（Intelligence Augmentation），整件事的味道就不一樣了。IA 的核心始終是人——由我們來決策、來關懷，讓 AI 當那個不喊累的第二大腦，去承接繁瑣、重複的資料整理。人機協同真正的目的，是把行政效率推到極致，好讓我們能專心在更有溫度的溝通與判斷上。"},
{u:"總覽",t:"AI 輔助學校行政的四大板塊",x:"回到學校現場，我們把 AI 的應用大致分成四個板塊：教學準備（像教案架構、評量出題）、科學實驗（實驗設計與圖表分析）、導師事務（親師溝通與評語撰寫），以及學校行政。今天的分享會把重心放在最後這一塊——公文的智慧起草、會議逐字稿的整理，還有政策法規的快速檢索與數位資料庫的建置。"},
{u:"單元一",t:"主流大型語言模型（LLM）概覽",x:"我們先從第一單元談起——主流大型語言模型（LLM）概覽。要讓 AI 成為得力的行政特助，得先摸清楚目前這幾個核心工具的脾氣，知道它們各自的強項在哪，才能在對的行政場景，把對的工具請出來。"},
{u:"單元一",t:"四大主流 LLM 對比",x:"我們日常主要用到四個工具。ChatGPT 像個全能型選手，自訂 GPTs 的生態特別豐富；微軟的 Copilot 則跟我們熟悉的 Office 環境緊緊綁在一起；Anthropic 的 Claude 以邏輯嚴謹、擅長長文本見長；至於 Google 的 Gemini，在多模態理解和雲端硬碟整合上優勢很明顯。與其問哪個最好，不如因地制宜，挑最合適的那一個。"},
{u:"單元一",t:"ChatGPT：最廣為人知的行政助理",x:"講到 ChatGPT，大家應該都不陌生。作為目前最成熟的對話式 AI，它就像一位反應很快的全能助手——起草一封通知信、幫校慶活動想標題、把一團亂的會議重點理清楚，它都能立刻接招。對行政同仁來說，最迷人的其實是那些自訂 GPTs，我們可以為學校某一項業務，量身打造一台專用機器人。"},
{u:"單元一",t:"Microsoft Copilot：與微軟產品深度結合",x:"Copilot 是我們日常辦公很順手的幫手。學校的公務電腦大多是 Windows，而 Copilot 直接內建在系統與 Edge 瀏覽器裡，寫公文、查資料時隨手就能把它叫出來。它能讀懂我們當下在做什麼，也能就著網頁內容直接摘要——對那種一邊看網頁、一邊趕報告的同仁，特別實用。"},
{u:"單元一",t:"Claude：擅長文字編輯與長文本處理",x:"在幾個大模型裡，Claude 給我們的感覺特別沉穩、客觀。它很會處理大量文字，不管是冗長的會議紀錄、專案計畫書，還是教育部那種密密麻麻的法規文件都能接。回答的邏輯清楚、措辭嚴謹，很少出現那種一本正經胡說八道的「幻覺」。所以每當需要嚴格校對或撰寫正式報告，我們通常會交給 Claude。"},
{u:"單元一",t:"Google Gemini：與 Google 生態系深度整合",x:"身為 Google 生態圈的老用戶，我們對 Gemini 的整合能力印象很深。要從雲端硬碟裡翻出某份文件，或是在 Chrome 上臨時查一份備課資料，Gemini 能直接調用 Drive 裡的檔案來問答、整理。這一點，讓我們的備課與行政檢索速度有了很明顯的躍進。"},
{u:"單元二",t:"公文處理與智慧知識庫建置",x:"接著進入第二單元——公文處理與智慧知識庫建置。這一段，我們會具體示範怎麼把前面那幾個大模型，用在最讓行政同仁頭痛的公文撰寫上，也會談談怎麼用 NotebookLM，替學校打造一顆專屬的法規查詢大腦。"},
{u:"單元二",t:"學校公文處理的行政挑戰",x:"在學校處理公文，難處其實不少。格式繁複，得符合特定的三段式官樣架構；措辭又要極為講究，既得依法合規，還不能夾帶主觀情緒。更麻煩的是，我們常常得同時消化陳情人的意見、相關法規，還有過去的會議紀錄——這中間耗掉的精力，往往超乎外人想像。"},
{u:"單元二",t:"臺灣公文寫作助手實務",x:"為了對付這個痛點，我們用 ChatGPT 自訂了一台「臺灣公文寫作助手」。用起來很直覺：把事件的背景大綱、或是陳情人的來信丟進去，它就會自動整理成依法合規、符合「背景說明、調查結果、處理及改善情形」格式的公文草稿。起草公文那份心理負擔，一下子就輕了許多。"},
{u:"單元二",t:"客製化 AI 助手：GPTs 與 Gemini Gems",x:"很多人以為客製化 AI 得會寫程式，其實用自然語言就行。在 ChatGPT 的 GPTs 或 Gemini 的 Gems 裡，只要下幾句文字指令，甚至把學校的法規、範本檔案上傳當作「知識庫」，AI 就會乖乖照我們的要求回答。我們就做了一台「麗山專屬行政問答機器人」，新進同仁想查處室常用表格或作業流程，問它就對了。"},
{u:"單元二",t:"NotebookLM：革命性的智慧 PDF 資料庫",x:"說到知識庫的管理，Google 的 NotebookLM 帶來的改變是革命性的。最讓我們放心的是隱私——上傳的檔案只留在自己封閉的空間裡，不會被拿去餵公開模型。而且每次提問，它不只給答案，還會精準地在旁邊標出「引用來源」，讓我們一秒就能核對原文，完全不必擔心它憑空亂講。"},
{u:"單元二",t:"實作案例：校規法規查詢系統",x:"我們在麗山實際做了一件事：把學生手冊、請假規則、輔導管教辦法等數十份 PDF，一口氣上傳到 NotebookLM。以前導師或行政要確認「學生請假超過幾天會扣考」，得翻厚厚一本手冊；現在直接用白話問，AI 就給出精準解答，還附上條文的引用標記。省下來的行政時間，真的相當可觀。"},
{u:"單元三",t:"智慧會議記錄與高效語音轉文字",x:"緊接著是第三單元——智慧會議記錄與高效語音轉文字。會議是學校行政溝通的核心，卻也常常是效率最容易卡住的地方。這一段，我們想分享怎麼用語音科技，把繁瑣的會議記錄和後續整理，一舉變輕。"},
{u:"單元三",t:"會議記錄的行政負擔",x:"這個場景大家一定不陌生：兩三個小時的行政會議，記錄的同仁要一邊專心聽各處室報告，一邊飛快打字，一不留神就漏掉重要決議。會議結束後，為了生出完整的逐字稿或摘要，還得反覆倒帶聽錄音，花上兩三倍的時間。這種重複的聽寫工作，正是最需要用智能工具來增強的地方。"},
{u:"單元三",t:"語音轉文字工具地圖",x:"為了讓會議記錄更有效率，我們整理了一張語音轉文字的工具地圖。平時個人口述筆記，Windows 內建的 Win+H 最方便；要錄一段比較長的行政報告，網頁版 Word 的聽寫功能就很好用；至於多人參與的會議，Office 365 的語音擷取與轉錄，大概是目前最能替我們省時間的神器了。"},
{u:"單元三",t:"Microsoft 365 教育版帳號申請",x:"想用微軟這些強大的語音轉錄工具，得先有一組 Microsoft 365 教育版帳號。現在教育部和各級學校都會發給同仁 .edu.tw 信箱，只要到微軟官網的教育版專區輸入信箱、完成驗證，就能免費啟用網頁版 Word 等雲端辦公軟體。這是一項很實用、卻常被忽略的免費資源。"},
{u:"單元三",t:"Windows 系統內建語音聽寫（Win + H）",x:"日常辦公裡，我們最常推薦同仁的就是 Win+H。只要電腦是 Windows 10 以上，在任何能打字的地方——Word、網頁搜尋框、甚至 Line 視窗——按下 Windows 徽標鍵加字母 H，就能直接開口說。它的中文辨識率相當高，還會幫你自動補上標點，雙手打字的疲勞省下不少。"},
{u:"單元三",t:"網頁版 Word 語音聽寫功能",x:"要寫比較長的行政報告或心得省思時，我們會打開網頁版 Word。首頁工具列右邊有一個「聽寫」的麥克風圖示，點下去就能用講的來寫稿。我們實測過，語音輸入每分鐘可以超過 150 字，背景雜音的過濾也做得不錯，主管在構思公務草稿時特別合用。"},
{u:"單元三",t:"Office 365 語音擷取即時轉錄文字",x:"到了整理行政會議、或科展指導小組討論的時候，我們最依賴的是網頁版 Word 聽寫下拉選單裡的「轉錄（Transcribe）」。可以在會議室現場錄，也可以上傳現成音檔。最厲害的是，AI 會自動區分不同的說話者（喇叭 1、喇叭 2……），還把時間戳記跟逐字稿對得整整齊齊，傳統聽打逐字稿的人力一下省了大半。"},
{u:"單元三",t:"語音轉文字後的 AI 二次加工",x:"有了逐字稿，效率革命其實才正要開始。我們通常會把這份動輒上萬字的逐字稿，直接丟進 Google NotebookLM，再下一句簡單的指令，比方說：「請根據這份逐字稿，摘要今天的三大核心議題，並列出各處室的待辦清單與決議時間點。」幾秒鐘，一份精準的會議摘要就出來了——文字這時候才真正產生了行政價值。"},
{u:"單元三",t:"會議資料視覺化：從文字到結構圖",x:"有時候，條列式的文字摘要對同仁來說還是有點枯燥。這時我們會請 AI 把大綱結構化，一鍵轉成心智圖或流程圖。從文字走向視覺化的結構，能讓與會的人一眼就抓到複雜專案的脈絡，看清各處室之間怎麼分工，行政報告的呈現也就更直覺、更專業。"},
{u:"單元三",t:"會議重點圖示化：用 AI 生成配圖",x:"一份簡報或行政宣傳品，如果通篇只有文字，實在很難勾起讀者的興趣。我們會建議大家善用像 Microsoft Copilot 內建的 DALL·E 3 這類圖像生成工具。只要輸入幾個具體關鍵字，例如「代表團隊合作的簡約科技感扁平插畫」，AI 就即時生出質感統一的配圖，省去在圖庫裡苦苦翻找、還要擔心版權的麻煩。"},
{u:"單元三",t:"從會議資料到簡報生成",x:"會議一結束，如果馬上被要求向校長或全體同仁報告決議，我們可以把剛剛 NotebookLM 整理好的摘要大綱複製起來，貼進 Gamma 這類 AI 簡報工具。Gamma 的「文字生成簡報」功能，會在幾秒內自動排版、配圖，生出一份結構清楚的行政報告草稿，我們接著微調一下就能上場。"},
{u:"單元四",t:"數位資料庫與智能筆記系統",x:"接下來是第四單元——數位資料庫與智能筆記系統。行政工作說到底，就是資訊與資源的管理。這一段，我們想分享怎麼用 Notion 數位資料庫，替處室和教學團隊建起一顆共用的智慧知識大腦。"},
{u:"單元四",t:"Notion 數位資料庫：結構化整理資源",x:"在我們的行政協作裡，Notion 扮演著核心角色。它跟傳統的 Excel、Word 不太一樣——支援多人即時協作，而且同一個資料庫，可以一鍵在表格、看板、行事曆、畫廊之間切換視角。這意味著，不管是跨處室的活動進度、公文的簽辦狀態，還是教學教材的累積，我們都能在同一個數位工作區裡順順地管起來。"},
{u:"單元四",t:"實務案例：生物科錯題本與 Notion AI 診斷",x:"在生物科的教學裡，我們也把 Notion 資料庫和 Notion AI 巧妙地兜在一起，帶著學生建立「生物科選擇題錯題本」。學生貼上寫錯的題目與選項，我們就用 Notion AI 當場診斷，請它分析錯誤概念、補上相關的生物學背景。這樣一來，不但減輕了老師逐題輔導的負擔，更引導學生自己把知識網絡一點一點架了起來。"},
{u:"單元五",t:"AI 智慧搜尋與大數據分析整理",x:"緊接著是第五單元——AI 智慧搜尋與大數據分析整理。面對海量的網路資訊和學校數據，我們怎麼跳出傳統關鍵字檢索的框，用更自然、更聰明的方式，拿到精準的答案與圖表？這正是接下來要聊的。"},
{u:"單元五",t:"AI 搜尋引擎：Perplexity & Felo Search",x:"新一代的 AI 搜尋工具，徹底改了我們的檢索習慣。傳統 Google 給你的是一長串網頁連結，還得自己點進去讀、自己整理；而 Perplexity 和 Felo Search 是直接把網路上的多方資訊融會貫通成一段簡明的回答，並附上引用連結的角標。特別是 Felo，跨語言搜尋能力很強，能自動把國外的學術研究翻成中文，端到你眼前。"},
{u:"單元五",t:"資料查詢檢索：快速找尋教育法規",x:"在學校，我們常得查閱龐雜的教育法規與政策，傳統法規庫檢索往往像大海撈針。現在，我們可以直接對 AI 搜尋引擎下具體的提示詞，例如：「請幫我找出臺北市高中學生評量辦法的最新修改條文，並摘要有關扣考與補考的規定。」它不只快速給重點，我們還能循著它附的網址，跳回官方網站再驗證一次，確保法規沒有出錯。"},
{u:"單元五",t:"行政數據分析：利用 LLM 快速整理",x:"除了查法規，AI 也是處理行政數據的利器。過去拿到一堆雜亂的問卷或學生成績，光是手動清洗就得耗掉大把時間；現在，我們把資料貼給 AI，請它格式化成整齊表格、算平均數與標準差，甚至請它寫一段 Python 幫忙畫趨勢圖。AI 一介入，數據分析就不再是少數人的專利了。"},
{u:"單元六",t:"多媒體生成與行政設計美化",x:"現在進入第六單元——多媒體生成與行政設計美化。學校的文宣、校景導覽、行政海報，怎麼透過 AI 圖像生成兼顧美感，又保留麗山特有的校園氣味與人文情懷？我們一起來看看。"},
{u:"單元六",t:"AI 圖片生成：Copilot / Gemini / ChatGPT",x:"做活動文宣或簡報配圖時，我們常會找 Copilot、Gemini 或 ChatGPT 幫忙。這三個工具在生圖上各有各的味道，但對行政同仁來說，它們最大的價值是——把設計的門檻拉得很低。不管是想要一張「溫馨的親師溝通插圖」，還是「科技感的活動海報背景」，用對話就能在幾秒內生出高畫質的素材，行政文宣不必再單調下去。"},
{u:"單元六",t:"實作案例：將校景轉為吉卜力動畫風",x:"在麗山，我們做過一個很溫馨的嘗試。把寫實的校園相片當參考，輸入提示詞，請 AI 生出「吉卜力動畫風格的麗山校園，帶著溫暖的手繪質感與柔和光影」。成品美得出乎意料，既留住了麗山建築的特色，又多了一份童話般的人文溫度。這些圖後來用在校園導覽和活動海報上，師生的反應都很好。"},
{u:"單元六",t:"簡報生成神器 Gamma 的高效應用",x:"如果要快速做一份行政宣導簡報，Gamma 幾乎是首選。把會議大綱或宣導內容準備好，貼進去，它就自動幫你排版、配色、配上卡片插圖。更好的是，它支援線上即時編輯與協作，改字很輕鬆，還能一鍵匯出成標準的 PowerPoint（.pptx）。製作簡報的時間，就這樣被大幅壓縮了。"},
{u:"單元六",t:"行政業務簡報美化技巧",x:"實務上，我們也想跟同仁聊幾個簡報美化的心得。最要緊的是「精簡字數」，把冗長的段落濃縮成三到五個關鍵要點；再來，多用大字標題和強調色（像湖水綠）去牽引讀者的視線；最後，盡量選風格統一的 AI 扁平插圖或高質感校景照，別再用那種低解析度的傳統剪貼畫——簡報的質感，自然就出來了。"},
{u:"單元七",t:"跨國交流與網頁即時翻譯應用",x:"接下來是第七單元——跨國交流與網頁即時翻譯應用。隨著雙語教育和跨國校際交流一路推進，行政同仁常得處理外文郵件與國外文獻。這一段，我們要分享幾個最實用的雙語翻譯工具。"},
{u:"單元七",t:"雙語並排網頁翻譯：沉浸式翻譯",x:"讀國外教育政策或英文網頁時，我們很推薦裝一個「沉浸式翻譯」瀏覽器擴充功能。它跟一般整頁翻譯不一樣——會保留英文原文，同時在下方直接補上中文，做成雙語並排的版面。這樣既不破壞網頁原本的排版，又支援 PDF 文件與 YouTube 字幕翻譯，是我們快速吸收國外資訊的好幫手。"},
{u:"單元七",t:"實作案例：自製即時雙語翻譯網頁程式",x:"除了現成工具，我們也試著引導 AI，設計了一款「即時雙語翻譯網頁程式」，部署在 GitHub Pages 上，同仁點連結就能用，甚至提供免安裝、可離線運行的網頁檔。操作介面很直覺，左右分欄對照，就是專門為了幫行政人員處理跨國校際交流信件與公務文件翻譯而做的。"},
{u:"單元八",t:"AI Agent 前瞻與結語",x:"最後，我們走進第八單元——AI Agent 前瞻與結語。這一段，我們會從現在這種「對話式 AI」再往前跨一步，展望未來那種能自主規劃、自主執行任務的「AI 代理」，並用麗山校園的生態關懷，替今天的研習收尾。"},
{u:"單元八",t:"AI Agent（人工智慧代理）的行政願景",x:"現在的 AI，大致還是「我們問、它答」。但未來的方向是 AI Agent——人工智慧代理。它具備規劃、記憶與工具調用的能力，只要給它一個目標，比方說「幫我籌辦下週的教務會議」，它就會自己查行事曆、寄信問主管時間、預約會議室，甚至把會議大綱都擬好。行政工作，也就會從「AI 輔助」慢慢走向「全自動特助」的時代。"},
{u:"結語",t:"教育理念與麗山關懷（藏尾詩）",x:"研習的最後，我們想用一首結合麗山校園生態與教育關懷的藏尾詩，替今天人機協同的願景作結：「樹蛙升歌夜色麗，蜓蜥華行映青山，蛺蝶偉姿飛影高，紅葉楓情秋意中」——四句藏著「麗山高中」四個字。科技能帶來無窮的效率，但我們對自然與生命的那份關懷、對教育的那份溫度，始終是不可取代的核心。謝謝大家，讓我們一起，走向智慧的未來。"}
];

let cur = 0;
const $ = id => document.getElementById(id);
const slideImg=$('slideImg'), notes=$('notes');

// build filmstrip
const strip=$('strip');
DATA.forEach((d,i)=>{
  const t=document.createElement('div'); t.className='thumb'; t.dataset.i=i;
  t.innerHTML=`<span class="n">${i+1}</span><img loading="lazy" src="${IMG(i+1)}" alt="">`;
  t.onclick=()=>go(i);
  strip.appendChild(t);
});
const thumbs=[...strip.children];

function render(){
  const d=DATA[cur];
  slideImg.src=IMG(cur+1);
  $('nUnit').textContent=d.u;
  $('nTitle').textContent=d.t;
  $('nText').textContent=d.x;
  $('ind').textContent=`${cur+1} / ${TOTAL}`;
  notes.scrollTop=0;
  thumbs.forEach((t,i)=>t.classList.toggle('active',i===cur));
  const at=thumbs[cur];
  if(at) at.scrollIntoView({inline:'center',block:'nearest'});
  if(player.classList.contains('on')) renderPlayer();
}
function go(i){ cur=(i+TOTAL)%TOTAL; render(); }
function next(){ go(cur+1); }
function prev(){ go(cur-1); }

$('next').onclick=next; $('prev').onclick=prev;

// ---- autoplay (inline) ----
let autoTimer=null;
function startAuto(){
  stopAuto(true);
  const sec=Math.max(2,+$('secInput').value||12);
  autoTimer=setInterval(next,sec*1000);
  $('autoBtn').textContent='⏸ 暫停播放';
  $('autoBtn').classList.add('primary');
}
function stopAuto(silent){
  if(autoTimer){clearInterval(autoTimer);autoTimer=null;}
  if(!silent){$('autoBtn').textContent='▶ 自動播放';$('autoBtn').classList.remove('primary');}
}
$('autoBtn').onclick=()=>{ autoTimer?stopAuto():startAuto(); };
$('secInput').onchange=()=>{ if(autoTimer) startAuto(); };

// ---- theme ----
$('themeBtn').onclick=()=>{
  const dark=document.documentElement.getAttribute('data-theme')==='dark';
  document.documentElement.setAttribute('data-theme',dark?'light':'dark');
  $('themeBtn').textContent=dark?'🌙 深色':'☀️ 淺色';
};

// ---- fullscreen player ----
const player=$('player'), pImg=$('pImg');
let pTimer=null, pPlaying=true;
function renderPlayer(){
  pImg.src=IMG(cur+1);
  $('pNum').textContent=`${cur+1} / ${TOTAL}`;
}
function pSchedule(){
  if(pTimer)clearInterval(pTimer);
  if(!pPlaying)return;
  const sec=Math.max(2,+$('pSec').value||12);
  pTimer=setInterval(()=>{ next(); },sec*1000);
}
function openPlayer(){
  player.classList.add('on'); renderPlayer(); pPlaying=true; $('pPlay').textContent='⏸';
  pSchedule();
  if(player.requestFullscreen) player.requestFullscreen().catch(()=>{});
}
function closePlayer(){
  player.classList.remove('on');
  if(pTimer){clearInterval(pTimer);pTimer=null;}
  if(document.fullscreenElement) document.exitFullscreen().catch(()=>{});
}
$('fsBtn').onclick=openPlayer;
$('pExit').onclick=closePlayer;
$('pNext').onclick=()=>{ next(); pSchedule(); };
$('pPrev').onclick=()=>{ prev(); pSchedule(); };
$('pPlay').onclick=()=>{
  pPlaying=!pPlaying; $('pPlay').textContent=pPlaying?'⏸':'▶'; pSchedule();
};
$('pSec').onchange=()=>{ if(pPlaying) pSchedule(); };
document.addEventListener('fullscreenchange',()=>{
  if(!document.fullscreenElement && player.classList.contains('on')) closePlayer();
});

// ---- keyboard ----
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();next();if(pTimer)pSchedule();}
  else if(e.key==='ArrowLeft'){prev();if(pTimer)pSchedule();}
  else if(e.key==='Escape'&&player.classList.contains('on')){closePlayer();}
  else if(e.key==='Home'){go(0);}
  else if(e.key==='End'){go(TOTAL-1);}
});

// ---- swipe on stage & player ----
function addSwipe(el){
  let x0=null;
  el.addEventListener('touchstart',e=>x0=e.touches[0].clientX,{passive:true});
  el.addEventListener('touchend',e=>{
    if(x0===null)return; const dx=e.changedTouches[0].clientX-x0;
    if(Math.abs(dx)>40){ dx<0?next():prev(); if(pTimer)pSchedule(); } x0=null;
  },{passive:true});
}
addSwipe($('slideImg').parentElement); addSwipe(player);

render();
</script>
</body>
</html>
